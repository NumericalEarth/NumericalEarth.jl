name: Documentation

# Path-based gating is implemented *inside* this workflow (via the `changes`
# job and per-job `if:` conditions) rather than via a trigger-level `paths:`
# filter. With a trigger-level filter, the entire workflow — including the
# `docs-summary` aggregator — would not run on out-of-path PRs, leaving any
# required status checks pending forever and blocking the merge button for
# non-admins. By dropping `paths:` here, the workflow always starts and
# `docs-summary` always reports a status to branch protection.
on:
  pull_request:
  push:
    branches:
      - main
    tags: '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JULIA_NUM_PRECOMPILE_TASKS: 8
  JULIA_NUM_THREADS: 8
  JULIA_DEPOT_PATH: "/storage5/github-action-runners/julia-depot"
  NUMERICAL_EARTH_LABEL_BUILD_ALL_EXAMPLES: 'build all examples'
  CDSAPI_URL: "https://cds.climate.copernicus.eu/api"
  CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
  COPERNICUS_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
  COPERNICUS_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
  ECCO_USERNAME: ${{ secrets.ECCO_USERNAME }}
  ECCO_WEBDAV_PASSWORD: ${{ secrets.ECCO_WEBDAV_PASSWORD }}

jobs:
  # Detect whether any docs-relevant paths changed on this PR / push. The
  # `build-docs` job gates itself on the `docs` output (`push` events always
  # build).
  changes:
    name: Detect path changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - '.github/workflows/docs.yml'
              - 'docs/**'
              - 'examples/**'
              - 'src/**'
              - 'Project.toml'

  build-docs:
    name: Build documentation
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true' }}
    runs-on: [self-hosted, tartarus, gpu-3]
    timeout-minutes: 1440
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12.5'
      - name: Set NUMERICAL_EARTH_BUILD_ALL_EXAMPLES
        shell: bash
        run: |
          if [[ ('${{ github.event_name }}' == 'push' && ('${{ github.ref }}' == 'refs/heads/main' || '${{ github.ref }}' == refs/tags/v*)) || ('${{ github.event_name }}' == 'pull_request' && ${{ contains(github.event.pull_request.labels.*.name, env.NUMERICAL_EARTH_LABEL_BUILD_ALL_EXAMPLES) }} == true) ]]; then
              NUMERICAL_EARTH_BUILD_ALL_EXAMPLES=true
          else
              NUMERICAL_EARTH_BUILD_ALL_EXAMPLES=false
          fi
          echo "NUMERICAL_EARTH_BUILD_ALL_EXAMPLES=${NUMERICAL_EARTH_BUILD_ALL_EXAMPLES}" | tee "${GITHUB_ENV}"
      - name: Instantiate and precompile
        shell: julia --project --color=yes {0}
        run: |
          using Pkg
          Pkg.instantiate(verbose=true)
          Pkg.precompile(strict=true)

          using CUDA
          CUDA.precompile_runtime()
      - name: Instantiate docs folder
        run: julia --project=docs --color=yes -e 'using Pkg; Pkg.instantiate(verbose=true)'
      - name: Build documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULIA_DEBUG: Documenter
          JULIA_SSL_NO_VERIFY: "**"
        run: julia --project=docs --color=yes docs/make.jl
      - uses: actions/upload-artifact@v6
        with:
          name: documentation-build
          path: docs/build
          retention-days: 10

  deploy-docs:
    # We want to deploy docs if:
    # * it's a push, but only to main
    # * it's a PR, but not from a fork
    # * on a release
    needs: build-docs
    if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'pull_request' && ! github.event.pull_request.head.repo.fork) }}
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    runs-on: [self-hosted, tartarus]
    timeout-minutes: 30
    concurrency:
      group: docs-pushing
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12.5'
      - uses: actions/download-artifact@v7
        with:
          name: documentation-build
          path: docs/build
      - name: Remove extra files
        # There may be JLD2 files generated during execution of Literate
        # examples, we don't need them on the website.
        run:
          rm -fv docs/build/literated/*.jld2
      - name: Deploy documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --color=yes docs/deploy.jl

  #####
  ##### Aggregator: single required check for branch protection
  #####
  ##### `docs-summary` is intended to be the *only* Documentation status check
  ##### listed as required in branch protection / rulesets. It runs
  ##### unconditionally (`if: always()`) and passes iff every needed job is
  ##### `success` or `skipped` — so PRs that legitimately skip jobs (e.g.
  ##### out-of-path changes, or `deploy-docs` on a fork PR) can still merge,
  ##### while real failures still block.

  docs-summary:
    name: docs-summary
    if: always()
    needs:
      - changes
      - build-docs
      - deploy-docs
    runs-on: ubuntu-latest
    steps:
      - name: Check that all needed jobs passed or were skipped
        run: |
          echo '${{ toJSON(needs) }}'
          jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' <<< '${{ toJSON(needs) }}'
