name: CI

on:
  pull_request:
    paths: &paths
      - ".github/workflows/ci.yml"
      - "ext/**"
      - "src/**"
      - "test/**"
      - "Project.toml"
  push:
    paths: *paths
    branches:
      - main
    tags: "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read

env:
  ECCO_USERNAME: ${{ secrets.ECCO_USERNAME }}
  ECCO_WEBDAV_PASSWORD: ${{ secrets.ECCO_WEBDAV_PASSWORD }}
  COPERNICUS_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
  COPERNICUS_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
  CDSAPI_URL: "https://cds.climate.copernicus.eu/api"
  CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
  DESTINE_ACCESS_TOKEN: ${{ secrets.DESTINE_ACCESS_TOKEN }}
  DATADEPS_ALWAYS_ACCEPT: true
  JULIA_PKG_SERVER_REGISTRY_PREFERENCE: 'eager'

#####
##### CPU tests (GitHub-hosted runners)
#####

jobs:
  cpu_tests:
    name: (CPU) - Julia ${{ matrix.version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12.5"
        os:
          - ubuntu-latest
        arch:
          - "default"
    steps:
      - name: Show available storage before cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          large-packages: false
      - name: Cleanup /opt
        run: |
          sudo rm -rf /opt/*
      - name: Show available storage after cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
        with:
          # Share one depot cache with `cds_downloading`: both instantiate the same
          # test/Project.toml. Distinct cache names stored two near-identical ~1.3 GB copies,
          # and the repo total (10.7 GB) sat above GitHub's 10 GB budget, so every save
          # evicted an older cache and no job ever restored one. `include-matrix` appends
          # os/arch/version, so macOS and any future matrix entry still get their own key.
          cache-name: julia-cache;env=test
          cache-scratchspaces: false
      # ParallelTestRunner schedules longest-first from a duration history it keeps in a
      # scratchspace. `cache-scratchspaces: false` (needed: the dataset scratchspaces are
      # tens of GB) also discards that history, so every duration defaults to Inf and the
      # order falls back to random -- leaving a 38 min test to start last and run alone.
      # Cache just the history: a few KB, keyed to ParallelTestRunner's UUID.
      - uses: actions/cache@v4
        with:
          path: ~/.julia/scratchspaces/d3525ed8-44d0-4b2c-a655-542cee43accc/durations
          key: julia-test-durations;job=cpu_tests;${{ github.run_id }}
          restore-keys: julia-test-durations;job=cpu_tests;
      - uses: julia-actions/julia-runtest@v1
        with:
          # Cap parallelism at 2 workers. ParallelTestRunner's default_njobs
          # assumes ~2 GiB per worker, but the Breeze-compilation and bathymetry
          # tests peak at 2.5-3.5 GiB RSS each. On the 16 GiB GitHub-hosted
          # runner, the default (4 = core count) intermittently OOMs when several
          # heavy tests coincide, and the runner reports it as
          # "The operation was canceled." Two workers keep peak memory well
          # within budget while staying comfortably under the job timeout.
          test_args: '--verbose --jobs=2'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Show available storage at the end
        if: always()
        timeout-minutes: 2
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /

  #####
  ##### GPU tests (AWS self-hosted runners with Docker)
  #####

  gpu_tests:
    name: (GPU)
    runs-on: aws-linux-nvidia-gpu-l4
    container:
      image: ghcr.io/numericalearth/numerical-earth-docker-images:test-julia_1.12.5
      options: --gpus=all
      volumes:
        # Mount host directories so that we can delete some stuff afterwards
        - /opt:/host-opt
        - /usr/local:/host-usr-local
    timeout-minutes: 120
    strategy:
      fail-fast: false
    env:
      GPU_TEST: "true"
      OPENBLAS_NUM_THREADS: 1
      # Redirect temp to the workspace volume (bind-mounted from the
      # host's EBS disk) to avoid filling the container's overlay filesystem with
      # large data downloads and compiled artifacts.
      TMPDIR: /__w/_temp
      JULIA_DEPOT_PATH: '/__w/_temp/depot:/usr/local/share/julia:'
    steps:
      - uses: actions/checkout@v6
      - name: Create workspace temp directories
        run: mkdir -p "${TMPDIR}"
      - name: Configure git safe directory
        run: git config --global --add safe.directory ${PWD}
      - name: Copy LocalPreferences
        run: cp -v /usr/local/share/julia/environments/numericalearth/LocalPreferences.toml test/.
      - name: df before cleanup
        run: |
          df -hT
      - name: Clean up space on host device
        # Save storage by deleting CUDA toolkits and other Nvidia tools we don't need
        run: |
          rm -rfv /host-opt/nvidia/ /host-usr-local/cuda*
      - name: df after cleanup
        run: |
          df -hT
      - name: "Set test arguments"
        shell: bash
        run: |
          # Run tests in verbose mode
          TEST_ARGS=(--verbose)
          # Cap parallelism at 4 workers. `nproc - 1` (== 7 on the 8-vCPU GPU
          # runner) oversubscribes the box: the GPU job runs the full, heaviest
          # test set (Breeze compilation, nested atmosphere, ocean-sea-ice,
          # bathymetry), so workers frequently hit ParallelTestRunner's RSS
          # limit and get recycled. Each recycle spawns a fresh Malt worker, and
          # under the resulting contention a spawn occasionally exceeds Malt's
          # fixed 30 s connect timeout -- which aborts the whole run with
          # "Worker process exited before we could connect / Timeout" (not OOM;
          # earlyoom never fires and swap is untouched). Four workers keep half
          # the cores free for the manager and worker spawns while staying well
          # under the job timeout. See the CPU job for the sibling OOM cap.
          njobs=$(($(nproc) - 1))
          TEST_ARGS+=(--jobs=$((njobs < 4 ? njobs : 4)))
          echo "runtest_test_args=${TEST_ARGS[@]}" | tee -a "${GITHUB_ENV}"
      - name: Update registry
        shell: julia --color=yes {0}
        run: |
          using Pkg
          Pkg.Registry.rm("General")
          Pkg.Registry.add("General")
          Pkg.Registry.update()
      - name: Run tests
        run: |
          earlyoom -m 3 -s 100 -r 300 --prefer 'julia' &
          julia --project --color=yes --check-bounds=yes -e '
              using Pkg;
              Pkg.test(; coverage=true,
                       julia_args=["--check-bounds=yes", "--compiled-modules=yes", "-O0"],
                       test_args=`${{ env.runtest_test_args }}`)
          '
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Show available storage at the end
        if: always()
        timeout-minutes: 2
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /

  #####
  ##### Specialized tests (GitHub-hosted runners)
  #####

  cds_downloading:
    name: Data Downloading - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12.5"
        os:
          - ubuntu-latest
        arch:
          - default
        include:
          - os: macOS-latest
            arch: aarch64
            version: "1.12.5"
    steps:
      - name: Show available storage before cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - name: Free Disk Space
        if: ${{ runner.os != 'macOS' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          large-packages: false
      - name: Cleanup /opt
        if: ${{ runner.os != 'macOS' }}
        run: |
          sudo rm -rf /opt/*
      - name: Show available storage after cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
        with:
          # Shares the depot cache with `cpu_tests` -- same test/Project.toml. See that job.
          cache-name: julia-cache;env=test
          cache-scratchspaces: false
      - name: Run tests
        run: |
          julia --project --color=yes --check-bounds=yes -e '
              using Pkg;
              Pkg.test(; coverage=true,
                        julia_args=["--check-bounds=yes", "--compiled-modules=yes", "-O0"],
                        test_args=["--verbose", "test_cds_downloading", "test_jra55_ecco_en4_etopo_downloading", "test_glorys_downloading", "test_copernicus_dem_downloading"])
          '
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  
  reactant:
    name: Reactant extension - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12.5"
        os:
          - ubuntu-latest
        arch:
          - default
    steps:
      - name: Show available storage before cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          large-packages: false
      - name: Cleanup /opt
        run: |
          sudo rm -rf /opt/*
      - name: Show available storage after cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
        with:
          # `test/reactant` is a much smaller environment than `test`, so it gets its own
          # (small) cache rather than sharing the `env=test` one.
          cache-name: julia-cache;env=reactant
          cache-scratchspaces: false
      # Runs against test/reactant/Project.toml, which carries Reactant and nothing else it
      # doesn't need. Reactant is the sole path to Enzyme (316 s, the largest single
      # precompile unit) and pulls the very large Reactant_jll artifact; keeping it out of
      # the shared test env stops `cpu_tests`/`cds_downloading` from precompiling ~9 min of
      # code they never call, and keeps their cache inside GitHub's 10 GB budget.
      - name: Run tests
        run: |
          julia --project=test/reactant --color=yes --check-bounds=yes -O0 \
                --code-coverage=@${PWD}/src -e '
              using Pkg
              Pkg.instantiate()
              include("test/reactant/test_reactant.jl")
          '
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
  
  #####
  ##### Distributed MPI tests (GitHub-hosted runners)
  #####

  # distributed_tests:
  #   name: Distributed MPI tests (4 ranks)
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 60
  #   env:
  #     OPENBLAS_NUM_THREADS: 1
  #     JULIA_NUM_PRECOMPILE_TASKS: 8
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: julia-actions/setup-julia@v2
  #       with:
  #         version: '1.12.5'
  #     - name: Instantiate and precompile
  #       shell: julia --project --color=yes {0}
  #       run: |
  #         using Pkg
  #         Pkg.instantiate(verbose=true)
  #         Pkg.precompile(strict=true)
  #     - name: Install mpiexecjl
  #       run: julia --project --color=yes -e 'using MPI; MPI.install_mpiexecjl(destdir=".")'
  #     - name: Run distributed tests
  #       env:
  #         TEST_GROUP: distributed
  #       run: ./mpiexecjl -np 4 julia --project --color=yes -e 'using Pkg; Pkg.test()'

  #####
  ##### The final test (a final check)
  #####

  ci:
    name: CI
    needs:
      - cpu_tests
      - gpu_tests
      - cds_downloading
      - reactant
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - run: echo "All CI jobs passed successfully."
