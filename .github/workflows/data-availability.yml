name: Data Availability

# These tests download every variable of every dataset from third-party servers (ESGF, ECCO,
# Copernicus CDS, GLORYS) and assert the files arrive. They exercise the availability of
# external services rather than our own code, they are network-bound (~21 min for the
# JRA55/ECCO/EN4/ETOPO sweep alone), and a third-party outage fails them regardless of the
# change under review. Running them nightly keeps that signal without blocking every PR.
#
# Trigger by hand with: gh workflow run data-availability.yml

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

env:
  ECCO_USERNAME: ${{ secrets.ECCO_USERNAME }}
  ECCO_WEBDAV_PASSWORD: ${{ secrets.ECCO_WEBDAV_PASSWORD }}
  COPERNICUS_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
  COPERNICUS_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
  CDSAPI_URL: "https://cds.climate.copernicus.eu/api"
  CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
  DESTINE_ACCESS_TOKEN: ${{ secrets.DESTINE_ACCESS_TOKEN }}
  DATADEPS_ALWAYS_ACCEPT: true
  JULIA_PKG_SERVER_REGISTRY_PREFERENCE: 'eager'

jobs:
  cds_downloading:
    name: Data Downloading - Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12.5"
        os:
          - ubuntu-latest
        arch:
          - default
        include:
          - os: macOS-latest
            arch: aarch64
            version: "1.12.5"
    steps:
      - name: Show available storage before cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - name: Free Disk Space
        if: ${{ runner.os != 'macOS' }}
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          large-packages: false
      - name: Cleanup /opt
        if: ${{ runner.os != 'macOS' }}
        run: |
          sudo rm -rf /opt/*
      - name: Show available storage after cleanup
        run: |
          echo " --> df -h /"
          df -h /
          echo " --> df -a /"
          df -a /
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
        with:
          # Restores the depot cache that CI's `cpu_tests` saves -- same test/Project.toml.
          cache-name: julia-cache;env=test
          cache-scratchspaces: false
      - name: Run tests
        run: |
          julia --project --color=yes --check-bounds=yes -e '
              using Pkg;
              Pkg.test(; coverage=true,
                        julia_args=["--check-bounds=yes", "--compiled-modules=yes", "-O0"],
                        test_args=["--verbose", "test_cds_downloading", "test_jra55_ecco_en4_etopo_downloading", "test_glorys_downloading", "test_copernicus_dem_downloading"])
          '
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
